name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend — dotnet test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/PriorAuthSystem.Tests/PriorAuthSystem.Tests.csproj

      - name: Build
        run: dotnet build tests/PriorAuthSystem.Tests/PriorAuthSystem.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/PriorAuthSystem.Tests/PriorAuthSystem.Tests.csproj --no-build --configuration Release --logger "github;verbosity=detailed"

  build-frontend:
    name: Frontend — npm run build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5278
          VITE_HUB_URL: http://localhost:5278/hubs/priorauth
        run: npm run build
